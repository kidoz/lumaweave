name: CI

on:
  push:
  pull_request:

jobs:
  cpu:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install build tools
        run: python -m pip install 'meson>=1.3,<2' ninja
      - name: Configure
        run: meson setup build -Dvulkan=disabled -Ddx12=disabled -Dtests=true
      - name: Compile
        run: meson compile -C build
      - name: Test
        run: meson test -C build --print-errorlogs
